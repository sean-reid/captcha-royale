name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust-engine:
    name: CAPTCHA Engine (Rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/captcha-engine
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/captcha-engine
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Tests
        run: cargo test
      - name: WASM Build
        run: |
          cargo install wasm-pack --locked || true
          wasm-pack build --target web --out-dir pkg

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    needs: rust-engine
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      # Build WASM first
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: |
          cargo install wasm-pack --locked || true
          wasm-pack build --target web --out-dir pkg
        working-directory: packages/captcha-engine
      - name: Type Check
        run: npx tsc --noEmit
      - name: Build
        run: npx vite build

  worker:
    name: Worker (Cloudflare)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/worker
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
        working-directory: .
      - name: Type Check
        run: npx tsc --noEmit
