<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAPTCHA Royale</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #0a0a1a;
        color: #e0e0e0;
        min-height: 100vh;
      }
      #root { min-height: 100vh; }

      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      button:hover:not(:disabled) { opacity: 0.85; }
      button:active:not(:disabled) { transform: scale(0.97); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      input:focus { border-color: #ff6b6b !important; }

      ::-webkit-scrollbar { width: 8px; }
      ::-webkit-scrollbar-track { background: #0a0a1a; }
      ::-webkit-scrollbar-thumb { background: #2a2a4e; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a5e; }

      ::selection { background: #ff6b6b33; color: #fff; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
